services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logixsoft_backend
    restart: unless-stopped
    environment:
      PORT: 4000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: logixsoft_user
      DB_PASSWORD: logixsoft_pass
      DB_NAME: logixsoft_db
      DB_POOL_MAX: 10
      DB_IDLE_TIMEOUT_MS: 30000
      JWT_SECRET: change_this_secret_in_real_env
      JWT_EXPIRES_IN: 1d
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000/api
    container_name: logixsoft_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  postgres:
    build:
      context: ./bd
      dockerfile: Dockerfile
    container_name: logixsoft_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: logixsoft_db
      POSTGRES_USER: logixsoft_user
      POSTGRES_PASSWORD: logixsoft_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./bd/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logixsoft_user -d logixsoft_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: logixsoft_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@logixsoft.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_DISABLE_POSTFIX: "True"
      PYTHONWARNINGS: "ignore:pkg_resources is deprecated as an API:UserWarning"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
